name: Web
on:
  push:
    branches: [master]
    paths: ["services/web/**"]
  pull_request:
    branches: [master]
    paths: ["services/web/**"]

jobs:
  web:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/web
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - name: Install Dependencies
        run: yarn install

      - name: Run Lint
        run: yarn lint .
