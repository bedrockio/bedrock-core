name: API
on:
  push:
    branches: [master]
    paths: ["services/api/**"]
  pull_request:
    branches: [master]
    paths: ["services/api/**"]

jobs:
  api:
    name: Test and Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/api
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - name: Install Dependencies
        run: yarn install

      - name: Run Lint
        run: yarn lint . || true

      - name: Run Tests
        run: yarn test --silent
