apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - image: gcr.io/bedrock-foundation-production/bedrock-core-services-api
          imagePullPolicy: Always
          name: main
          env:
            - name: ENV_NAME
              value: "production"
            - name: NODE_ENV
              value: "production"
            - name: MONGO_URI
              value: "mongodb://mongo:27017/bedrock_production"
            - name: APP_URL
              value: "https://bedrock.foundation"
            - name: POSTMARK_FROM
              value: "no-reply@bedrock.foundation"
            - name: TWILIO_ACCOUNT_SID
              value: ""
            - name: TWILIO_FROM_NUMBER
              value: ""
            - name: UPLOADS_STORE
              value: "gcs"
            - name: UPLOADS_GCS_BUCKET
              value: "bedrock-foundation-production-uploads"
            - name: LOG_LEVEL
              value: "debug"
            # The `bedrock cloud` command in the CLI will help with
            # the creation and storing of secrets for production.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: JWT_SECRET
            - name: POSTMARK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: POSTMARK_API_KEY
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: TWILIO_AUTH_TOKEN
          ports:
            - name: http-server
              containerPort: 2300
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            httpGet:
              path: /1/status/mongodb
              port: 2300
          livenessProbe:
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            httpGet:
              path: /1/status/mongodb
              port: 2300
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: api
                topologyKey: kubernetes.io/hostname
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
# Notes
# -----
# replicas: 2 — never run a single pod; one node going down = total outage
# strategy.maxUnavailable: 0 — never kill a pod during a deploy before a new one is healthy
# strategy.maxSurge: 1 — spin up 1 extra pod during deploys to maintain capacity
# podAntiAffinity (preferred) — spreads pods across nodes so a single node failure
#   doesn't take down all replicas. "preferred" (not "required") so scheduling
#   still works if there's only one node available.
# readinessProbe — controls when a pod receives traffic.
#   3 failures × 10s = 30s of MongoDB unresponsiveness before pulled from LB.
# livenessProbe — controls when a pod is killed and restarted.
#   6 failures × 10s = 60s before a kill, giving MongoDB time to recover
#   from transient slowness without triggering a restart loop.
#   initialDelaySeconds: 30 — don't check until the app has had time to boot.
